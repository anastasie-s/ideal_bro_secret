<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Compatibility Test · IDEAL BRO</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="grain"></div>
    <header class="topbar">
      <a class="brand" href="index.html">
        <span> ✦ </span>
        IDEAL BRO
      </a>
      <nav>
        <a class="active" href="index.html">ГЛАВНАЯ</a>
        <a href="rules.html">ПРАВИЛА</a>
        <a href="results.html">РЕЗУЛЬТАТЫ</a>
      </nav>
      <span class="badge"> ЗАСЕКРЕЧЕНО </span>
    </header>
    <main class="page test-page">
      <section class="intro">
        <h1>
          Тест
          <span> для идеальных бро </span>
        </h1>
        <p class="lead">
          Очень важные вопросы. Никаких правильных ответов — просто выбери
          то, что максимально про тебя сейчас.
        </p>
      </section>
      <section class="test-card">
        <div id="testLockScreen">
          <span class="lock-icon">🔒</span>
          <h2>Доступ к тесту</h2>
          <p class="sub">Введи код, который выдал хост.</p>
          <input
            id="testCodeInput"
            class="input code"
            type="password"
            placeholder="Код доступа"
            autocomplete="off"
          />
          <button class="btn primary full" id="testUnlockBtn">Открыть тест →</button>
          <p id="testErrorText" class="error hidden">Код неверный.</p>
        </div>
        <div id="startScreen" class="hidden">
          <label class="label" for="playerName"> Твоё имя </label>
          <input id="playerName" class="input" placeholder="Имя" />
          <button class="btn primary full" id="startBtn">Начать тест →</button>
        </div>
        <div id="questionScreen" class="hidden">
          <div class="question-top">
            <span id="counter"> </span>
            <div class="progress">
              <i id="progressBar"> </i>
            </div>
          </div>
          <h2 id="questionText"></h2>
          <p id="questionSub" class="sub"></p>
          <div id="options" class="options"></div>
          <div class="question-actions">
            <button class="btn ghost" id="backBtn">← Назад</button>
            <button class="btn primary" id="nextBtn">Далее →</button>
          </div>
        </div>
        <div id="resultScreen" class="hidden">
          <p class="kicker">test completed</p>
          <h2 id="resultTitle">Протокол составлен</h2>
          <p id="resultText" class="sub"></p>
        
          <button class="btn ghost" id="restartBtn">
            Пройти заново
          </button>
        </div>
      </section>
    </main>
    <footer>
      <b> ✦ IDEAL BRO </b>
    </footer>
    <script src="test.js"></script>
  </body>
</html>
