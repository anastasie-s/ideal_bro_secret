<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Admin · IDEAL BRO</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="grain"></div>

  <main class="admin-page">
    <section class="lock-card" id="adminLockScreen">
      <span class="lock-icon">🔒</span>
      <h2>Admin access</h2>
      <p class="sub">Введи пароль организатора.</p>
      <input id="adminCodeInput" class="input code" type="password" placeholder="Пароль" autocomplete="off" />
      <button class="btn primary full" id="adminUnlockBtn">Открыть админ-панель →</button>
      <p id="adminErrorText" class="error hidden">Пароль неверный.</p>
    </section>

    <section class="admin-panel hidden" id="adminPanel">
      <p class="kicker">АДМИН-ПРОТОКОЛ</p>

      <div class="admin-actions">
        <button class="btn primary" id="loadBtn">Загрузить результаты</button>
        <button class="btn ghost" id="seedBtn">Заполнить тестовыми данными</button>
        <button class="btn ghost" id="resetBtn">Начать сначала</button>
      </div>

      <div id="adminMessage" class="admin-message hidden"></div>

      <section class="admin-step hidden" id="playersStep">
        <h2>Участники</h2>
        <div id="playersList" class="admin-list"></div>
        <button class="btn primary" id="splitBtn">Разделить на 2 группы →</button>
      </section>

      <section class="admin-step hidden" id="groupsStep">
        <h2>Группы</h2>
        <div class="admin-grid">
          <div>
            <h3>Group A</h3>
            <div id="groupA" class="admin-list"></div>
          </div>
          <div>
            <h3>Group B</h3>
            <div id="groupB" class="admin-list"></div>
          </div>
        </div>
      </section>

      <section class="admin-step hidden" id="pairsStep">
        <h2>Пары</h2>

        <div class="pair-round">
          <div>
            <h3>Игра 1</h3>
            <p>Первый протокол совместимости.</p>
          </div>
          <button class="btn primary" data-game="1">Сформировать пары</button>
          <div id="pairsGame1" class="admin-list"></div>
        </div>

        <div class="pair-round">
          <div>
            <h3>Игра 2</h3>
            <p>Новые пары без повторов.</p>
          </div>
          <button class="btn primary" data-game="2">Сформировать пары</button>
          <div id="pairsGame2" class="admin-list"></div>
        </div>

        <div class="pair-round">
          <div>
            <h3>Игра 3</h3>
            <p>Финальная сборка оставшихся вариантов.</p>
          </div>
          <button class="btn primary" data-game="3">Сформировать пары</button>
          <div id="pairsGame3" class="admin-list"></div>
        </div>
      </section>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
