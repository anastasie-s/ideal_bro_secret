<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex" />
  <title>Admin · IDEAL BRO</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <div class="grain"></div>

  <main class="admin-screen">
    <section class="lock-card" id="adminLockScreen">
      <span class="lock-icon">🔒</span>
      <h2>Admin access</h2>
      <p class="sub">Введи пароль хоста.</p>
      <input id="adminCodeInput" class="input code" type="password" placeholder="Пароль" autocomplete="off" />
      <button class="btn primary full" id="adminUnlockBtn">Открыть админ-панель →</button>
      <p id="adminErrorText" class="error hidden">Пароль неверный.</p>
    </section>

    <section class="admin-dashboard hidden" id="adminPanel">
      <header class="admin-dashboard-head">
        <div>
          <p class="kicker">АДМИН-ПРОТОКОЛ</p>
          <h1>РАСПРЕДЕЛЕНИЕ</h1>
        </div>

        <div class="source-toggle">
          <button class="source-btn active" data-source="real">Боевой режим</button>
          <button class="source-btn" data-source="sandbox">Запуск теста</button>
        </div>
      </header>

      <div class="admin-toolbar">
        <button class="btn primary" id="loadBtn">Загрузить результаты</button>
        <button class="btn ghost" id="seedBtn">Заполнить sandbox</button>
        <button class="btn ghost" id="resetBtn">Начать сначала</button>
      </div>

      <div class="admin-workspace">
        <aside class="admin-left">
          <div class="panel-title">
            <span>01</span>
            <b>Участники и группы</b>
          </div>

          <div id="leftStatus" class="admin-muted">
            Результаты ещё не загружены.
          </div>

          <div id="playersBox"></div>
          <div id="groupsBox"></div>

          <button class="btn primary full hidden" id="createGroupsBtn">
            Разделить на две группы →
          </button>
        </aside>

        <section class="admin-right">
          <div class="game-tabs">
            <button class="game-tab active" data-game="1">Игра 1</button>
            <button class="game-tab" data-game="2">Игра 2</button>
            <button class="game-tab" data-game="3">Игра 3</button>
          </div>

          <div class="game-panel">
            <div class="panel-title">
              <span id="gameNumber">02</span>
              <b id="gameTitle">Пары · Игра 1</b>
            </div>

            <div class="admin-loader hidden" id="loader">
              <div class="loader-ring"></div>
              <p id="loaderText">Анализируем протокол...</p>
            </div>

            <div id="gameStatus" class="admin-muted">
              Сначала загрузи результаты и создай группы.
            </div>

            <div id="pairsBox"></div>

            <button class="btn primary full" id="generatePairsBtn" disabled>
              Сформировать пары для игры 1 →
            </button>
          </div>
        </section>
      </div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
