<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Секретное задание</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: linear-gradient(#162018, #090d0a);
      color: #f3ead7;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      width: 90%;
      max-width: 520px;
      padding: 32px;
      border: 1px solid #8f7b4f;
      border-radius: 18px;
      background: rgba(0, 0, 0, 0.45);
      box-shadow: 0 0 30px rgba(0,0,0,0.5);
      text-align: center;
    }

    h1 {
      margin-top: 0;
      letter-spacing: 2px;
      font-size: 28px;
    }

    .subtitle {
      opacity: 0.8;
      margin-bottom: 24px;
    }

    input {
      width: 100%;
      box-sizing: border-box;
      padding: 14px;
      font-size: 20px;
      border-radius: 10px;
      border: 1px solid #8f7b4f;
      background: #111;
      color: #f3ead7;
      text-align: center;
    }

    button {
      margin-top: 14px;
      width: 100%;
      padding: 14px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
      background: #c2a25a;
      color: #111;
      font-weight: bold;
    }

    .task {
      margin-top: 26px;
      padding: 20px;
      border-radius: 12px;
      background: rgba(255,255,255,0.08);
      font-size: 20px;
      line-height: 1.4;
      display: none;
    }

    .error {
      color: #ff8a8a;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>PEAK TRIAL</h1>
    <div class="subtitle">Введите пароль, чтобы получить секретное задание</div>

    <input id="passwordInput" type="text" placeholder="Пароль" autocomplete="off" />
    <button onclick="showTask()">Показать задание</button>

    <div id="taskBox" class="task"></div>
  </div>

  <script>
    const tasks = {
      "килька": "Для развития устойчивости пять раз подряд потеряй равновесие на медузе. Запрещается обсуждать задание с другими участниками.",
      "фломастер": "Найди время немного отдохнуть в колючках. Пяти секунд будет достаточно. Запрещается обсуждать задание с другими участниками.",
      "пельмень": "Найди лиану и не упусти шанс эффектно зацепиться за неё после прыжка сверху. Запрещается обсуждать задание с другими участниками.",
      "будильник": "Проверь свою стрессоустойчивость через непосредственное взаимодействие с ядовитой миной. Запрещается обсуждать задание с другими участниками.",
      "вермишель": "Найди гриб и не упусти шанс эффектно приземлиться на него после прыжка сверху. Запрещается обсуждать задание с другими участниками.",
      "швабра": "Проверь свою стрессоустойчивость через непосредственное взаимодействие со споровой миной. Запрещается обсуждать задание с другими участниками.",
      "сурикат": "Тебе требуется физический контакт с тремя большими кактусами (необязательно одновременно). Если вдруг им слишком понравится и они не будут тебя отпускать, то протяни руку помощи, чтоб освободиться. Запрещается обсуждать задание с другими участниками.",
      "табурет": "Получи достаточно солнечного света, чтобы потерять сознание, и выживи после этого. Запрещается обсуждать задание с другими участниками.",
      "тыква": "Дважды напомни напарнику о зимнем настроении при помощи снежка в лицо (ну или не в лицо, куда попадешь в общем). Запрещается обсуждать задание с другими участниками.",
      "пылесос": "Проведи достаточно времени на холоде, чтобы потерять сознание, и выживи после этого. Запрещается обсуждать задание с другими участниками.",
      "карась": "До конца биома не используй слова «лево», «право», «вперёд» и «назад» (однокоренные тоже нельзя). Запрещается обсуждать задание с другими участниками.",
      "кастрюля": "До конца биома регулярно спрашивай у напарника направление (например, куда идти, куда стрелять цепеметом, где финиш). Запрещается обсуждать задание с другими участниками.",
      "тест": "На вершине вулкана в какой-то момент вас ждет прикол.",
      "выхухоль": "На вершине вулкана в какой-то момент, когда все будут в сборе, тебе предоставится возможность улучшить свой личный счет. Внимательно следи за своим состоянием и за напарником. Запрещается обсуждать задание с другими участниками и чатом.",
      "половник": "На вершине вулкана в какой-то момент, когда все будут в сборе, тебе предоставится возможность улучшить свой личный счет. Внимательно следи за своим состоянием и за напарником. Запрещается обсуждать задание с другими участниками и чатом."
    };

    function showTask() {
      const input = document.getElementById("passwordInput");
      const taskBox = document.getElementById("taskBox");
      const password = input.value.trim().toLowerCase();

      taskBox.style.display = "block";

      if (tasks[password]) {
        taskBox.classList.remove("error");
        taskBox.textContent = tasks[password];
      } else {
        taskBox.classList.add("error");
        taskBox.textContent = "Задание не найдено. Проверь пароль.";
      }

      input.value = "";
      input.focus();
    }

    document.getElementById("passwordInput").addEventListener("keydown", function(event) {
      if (event.key === "Enter") {
        showTask();
      }
    });
  </script>
</body>
</html>
